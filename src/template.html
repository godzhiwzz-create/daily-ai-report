<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="每日 AI 科技资讯日报">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --card-bg: #ffffff;
      --text: #2c2c2c;
      --text-secondary: #666;
      --accent: #e85d04;
      --border: #e8e6e3;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }
    
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    
    header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    
    .badge {
      display: inline-block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }
    
    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .date {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .content {
      font-size: 16px;
    }
    
    .content h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      margin: 32px 0 16px;
      color: var(--text);
    }
    
    .content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 24px 0 8px;
    }
    
    .content p {
      margin-bottom: 12px;
    }
    
    .content a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .content a:hover {
      text-decoration: underline;
    }
    
    .content ul, .content ol {
      margin: 12px 0;
      padding-left: 24px;
    }
    
    .content li {
      margin-bottom: 8px;
    }
    
    .news-list {
      margin-top: 24px;
    }
    
    .news-item {
      background: var(--card-bg);
      padding: 20px;
      margin-bottom: 16px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    
    .news-item:hover {
      transform: translateY(-2px);
    }
    
    .news-item h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    
    .news-item h3 a {
      color: var(--text);
    }
    
    .news-item .meta {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }
    
    @media (max-width: 600px) {
      .container { padding: 32px 16px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="badge">Daily Report</span>
      <h1>AI 科技日报</h1>
      <p class="date">{{date}}</p>
    </header>
    
    <main class="content">
      {{content}}
    </main>
    
    <footer>
      <p>由 AI 自动生成 · 每天 8:00 更新</p>
    </footer>
  </div>
</body>
</html>
